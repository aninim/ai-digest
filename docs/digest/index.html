<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Digest — dads42</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #090e1a;
      --surface: #0f1729;
      --border: #1e2d4a;
      --accent: #f0a500;
      --accent2: #00c2ff;
      --text: #c8d8f0;
      --muted: #4a6080;
      --danger: #ff4455;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'DM Sans', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-weight: 300;
      min-height: 100vh;
      background-image: radial-gradient(ellipse at 20% 0%, #0a1f3a 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 100%, #0a1a10 0%, transparent 50%);
    }

    /* PASSWORD GATE */
    #gate {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
      flex-direction: column; gap: 1.5rem;
    }
    #gate h2 { font-family: var(--mono); color: var(--accent); font-size: 1rem; letter-spacing: 0.2em; }
    #gate input {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      padding: 0.75rem 1.25rem;
      font-size: 1rem;
      outline: none;
      width: 280px;
      text-align: center;
      letter-spacing: 0.1em;
    }
    #gate input:focus { border-color: var(--accent); }
    #gate .err { color: var(--danger); font-family: var(--mono); font-size: 0.8rem; display: none; }

    /* MAIN */
    #app { display: none; max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

    header {
      display: flex; justify-content: space-between; align-items: flex-start;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2rem;
    }
    .logo { font-family: var(--mono); font-size: 0.75rem; color: var(--muted); letter-spacing: 0.15em; }
    .logo span { color: var(--accent); }
    .timestamp { font-family: var(--mono); font-size: 0.7rem; color: var(--muted); text-align: right; }

    .top-story {
      background: var(--surface);
      border: 1px solid var(--accent);
      padding: 1.5rem 2rem;
      margin-bottom: 2.5rem;
      position: relative;
      animation: fadeUp 0.5s ease both;
    }
    .top-story::before {
      content: '// TOP STORY';
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--accent);
      letter-spacing: 0.2em;
      display: block;
      margin-bottom: 0.75rem;
    }
    .top-story p { font-size: 1.15rem; font-weight: 400; line-height: 1.6; color: #e8f0ff; }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      animation: fadeUp 0.5s ease both;
    }
    .card:nth-child(1) { animation-delay: 0.1s; }
    .card:nth-child(2) { animation-delay: 0.2s; }
    .card:nth-child(3) { animation-delay: 0.3s; }
    .card:nth-child(4) { animation-delay: 0.4s; }
    .card:nth-child(5) { animation-delay: 0.5s; grid-column: 1 / -1; }

    .card-header {
      padding: 1rem 1.5rem;
      display: flex; justify-content: space-between; align-items: center;
      cursor: pointer;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
      user-select: none;
    }
    .card-header:hover { border-bottom-color: var(--border); }
    .card-header.open { border-bottom-color: var(--border); }

    .card-title {
      font-family: var(--mono);
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      color: var(--accent2);
    }
    .card-count {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--muted);
      background: var(--bg);
      padding: 0.2rem 0.5rem;
      border: 1px solid var(--border);
    }
    .chevron { color: var(--muted); font-size: 0.8rem; transition: transform 0.3s; }
    .card-header.open .chevron { transform: rotate(180deg); }

    .card-body {
      max-height: 0; overflow: hidden;
      transition: max-height 0.4s ease;
      padding: 0 1.5rem;
    }
    .card-body.open { max-height: 1200px; padding: 1rem 1.5rem 1.5rem; }

    .item { padding: 0.75rem 0; border-bottom: 1px solid var(--border); }
    .item:last-child { border-bottom: none; }
    .item-title { font-weight: 500; color: #e8f0ff; margin-bottom: 0.3rem; font-size: 0.9rem; }
    .item-desc { font-size: 0.82rem; color: var(--text); line-height: 1.55; }
    .item-meta { margin-top: 0.4rem; display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .tag {
      font-family: var(--mono);
      font-size: 0.6rem;
      padding: 0.15rem 0.4rem;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--muted);
      letter-spacing: 0.05em;
    }
    .tag.accent { border-color: var(--accent); color: var(--accent); }
    .tag.accent2 { border-color: var(--accent2); color: var(--accent2); }
    .item-link { font-family: var(--mono); font-size: 0.65rem; color: var(--accent2); text-decoration: none; margin-top: 0.3rem; display: inline-block; }
    .item-link:hover { text-decoration: underline; }

    .empty { font-family: var(--mono); font-size: 0.75rem; color: var(--muted); font-style: italic; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .loading {
      display: flex; align-items: center; justify-content: center;
      height: 60vh;
      font-family: var(--mono);
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.1em;
    }

    /* TICKER */
    .ticker-wrap {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #050a14;
      border-top: 1px solid var(--accent);
      height: 2.2rem;
      overflow: hidden;
      z-index: 100;
      display: flex;
      align-items: center;
    }
    .ticker-label {
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      color: #050a14;
      background: var(--accent);
      padding: 0 0.75rem;
      height: 100%;
      display: flex;
      align-items: center;
      flex-shrink: 0;
      white-space: nowrap;
    }
    .ticker-track {
      display: flex;
      width: max-content;
      animation: ticker-scroll 60s linear infinite;
    }
    .ticker-track:hover { animation-play-state: paused; }
    .ticker-item {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--text);
      white-space: nowrap;
      padding: 0 2.5rem;
    }
    .ticker-item .ticker-cat {
      color: var(--accent2);
      margin-right: 0.5rem;
    }
    .ticker-item .ticker-sep {
      color: var(--muted);
      margin: 0 1.5rem;
    }
    @keyframes ticker-scroll {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
  </style>
</head>
<body>

<!-- PASSWORD GATE -->
<div id="gate">
  <h2>// DIGEST ACCESS</h2>
  <input type="password" id="pw" placeholder="enter password" autofocus onkeydown="if(event.key==='Enter')checkPw()">
  <div class="err" id="pw-err">ACCESS DENIED</div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="loading" id="loading">LOADING DIGEST...</div>
  <div id="content" style="display:none">
    <header>
      <div>
        <div class="logo">// <span>DADS42</span> AI DIGEST</div>
      </div>
      <div class="timestamp" id="ts"></div>
    </header>
    <div class="top-story"><p id="top-story-text"></p></div>
    <div class="grid" id="grid"></div>
  </div>
</div>

<!-- LIVE TICKER -->
<div class="ticker-wrap" id="ticker-wrap" style="display:none">
  <div class="ticker-label">AI LIVE</div>
  <div style="overflow:hidden;flex:1">
    <div class="ticker-track" id="ticker-track"></div>
  </div>
</div>

<script>
const PASSWORD = "dads42digest";

function checkPw() {
  const val = document.getElementById('pw').value;
  if (val === PASSWORD) {
    localStorage.setItem('digest_auth', '1');
    document.getElementById('gate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadDigest();
  } else {
    document.getElementById('pw-err').style.display = 'block';
    document.getElementById('pw').value = '';
  }
}

if (localStorage.getItem('digest_auth') === '1') {
  document.getElementById('gate').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadDigest();
}

async function loadDigest() {
  try {
    const res = await fetch('./data.json?v=' + Date.now());
    const data = await res.json();
    renderDigest(data);
  } catch(e) {
    document.getElementById('loading').textContent = 'NO DATA YET. RUN AGENT FIRST.';
  }
}

function renderDigest(d) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';
  document.getElementById('top-story-text').textContent = d.top_story || 'No top story today.';
  document.getElementById('ts').innerHTML = `DATE<br>${d.date}<br><br>UPDATED<br>${new Date().toLocaleTimeString()}`;

  const sections = [
    { key: 'tools', label: '🔧 TOOLS', render: renderTools },
    { key: 'hacks', label: '⚡ HACKS', render: renderHacks },
    { key: 'use_cases', label: '💡 USE CASES', render: renderUseCases },
    { key: 'big_moves', label: '🚀 BIG MOVES', render: renderBigMoves },
    { key: 'deprecated', label: '❌ DEPRECATED', render: renderDeprecated },
  ];

  const grid = document.getElementById('grid');
  sections.forEach((s, i) => {
    const items = d[s.key] || [];
    const card = document.createElement('div');
    card.className = 'card';
    const isOpen = i < 2;
    card.innerHTML = `
      <div class="card-header ${isOpen ? 'open' : ''}" onclick="toggleCard(this)">
        <span class="card-title">${s.label}</span>
        <span style="display:flex;gap:0.5rem;align-items:center">
          <span class="card-count">${items.length}</span>
          <span class="chevron ${isOpen ? 'open' : ''}">▾</span>
        </span>
      </div>
      <div class="card-body ${isOpen ? 'open' : ''}">${items.length ? s.render(items) : '<p class="empty">nothing notable today</p>'}</div>
    `;
    grid.appendChild(card);
  });

  buildTicker(d);
  lastDate = d.date;
}

function toggleCard(header) {
  header.classList.toggle('open');
  header.querySelector('.chevron').classList.toggle('open');
  header.nextElementSibling.classList.toggle('open');
}

function renderTools(items) {
  return items.map(i => `
    <div class="item">
      <div class="item-title">${i.name}</div>
      <div class="item-desc">${i.summary}</div>
      <div class="item-meta">
        ${i.relevance ? `<span class="tag accent">${i.relevance}</span>` : ''}
      </div>
      ${i.url ? `<a class="item-link" href="${i.url}" target="_blank">→ ${i.url}</a>` : ''}
    </div>`).join('');
}

function renderHacks(items) {
  return items.map(i => `
    <div class="item">
      <div class="item-title">${i.title}</div>
      <div class="item-desc">${i.description}</div>
      <div class="item-meta"><span class="tag">${i.source || ''}</span></div>
    </div>`).join('');
}

function renderUseCases(items) {
  return items.map(i => `
    <div class="item">
      <div class="item-title">${i.title}</div>
      <div class="item-desc">${i.description}</div>
      <div class="item-meta">
        ${i.applicable_to ? `<span class="tag accent2">${i.applicable_to}</span>` : ''}
      </div>
    </div>`).join('');
}

function renderBigMoves(items) {
  return items.map(i => `
    <div class="item">
      <div class="item-title">${i.who}</div>
      <div class="item-desc">${i.what}</div>
      <div class="item-meta"><span class="tag">${i.why_it_matters || ''}</span></div>
    </div>`).join('');
}

function renderDeprecated(items) {
  return items.map(i => `
    <div class="item">
      <div class="item-title" style="text-decoration:line-through;color:var(--muted)">${i.what}</div>
      <div class="item-desc">${i.note}</div>
    </div>`).join('');
}

// TICKER
function buildTicker(d) {
  const items = [];
  (d.big_moves || []).forEach(i => items.push({ cat: 'MOVE', text: `${i.who} — ${i.what}` }));
  (d.tools || []).forEach(i => items.push({ cat: 'TOOL', text: `${i.name}: ${i.summary}` }));
  (d.hacks || []).forEach(i => items.push({ cat: 'HACK', text: i.title + ' — ' + i.description }));
  (d.use_cases || []).forEach(i => items.push({ cat: 'USE', text: i.title + ': ' + i.description }));
  (d.deprecated || []).forEach(i => items.push({ cat: 'DEAD', text: i.what + ' — ' + i.note }));
  if (!items.length) return;

  // Double the items so seamless loop works
  const all = [...items, ...items];
  const track = document.getElementById('ticker-track');
  track.innerHTML = all.map(i =>
    `<span class="ticker-item"><span class="ticker-cat">[${i.cat}]</span>${i.text}<span class="ticker-sep">◆</span></span>`
  ).join('');
  document.getElementById('ticker-wrap').style.display = 'flex';

  // Adjust animation speed to content length
  const totalChars = items.reduce((s, i) => s + i.text.length, 0);
  const duration = Math.max(40, totalChars * 0.18);
  track.style.animationDuration = duration + 's';
}

// Re-fetch data.json every 5 minutes to catch fresh pushes
let lastDate = null;
async function pollDigest() {
  try {
    const res = await fetch('./data.json?v=' + Date.now());
    const data = await res.json();
    if (data.date !== lastDate) {
      lastDate = data.date;
      buildTicker(data);
    }
  } catch(e) {}
}
setInterval(pollDigest, 5 * 60 * 1000);
</script>
</body>
</html>
